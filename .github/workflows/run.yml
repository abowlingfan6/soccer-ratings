name: Pro Football Ratings Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas requests lxml beautifulsoup4

      # 1. API-Football pipeline
      - run: python worldcup_bot.py
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

      # 2. FBref enrichment
      - run: python fbref_loader.py

      # 3. Rating engine
      - run: python rating_engine.py
