name: Soccer Ratings Bot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run bot
        run: |
          python worldcup_bot.py

      - name: Commit CSV
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add data/worldcup_ratings.csv

          git diff --cached --quiet || git commit -m "Update ratings"

          git push
